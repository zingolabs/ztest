// CompactTxStreamer service — the gRPC contract that lightwalletd and
// Zaino both implement. Vendored from
// <https://github.com/zcash/lightwalletd/blob/master/walletrpc/service.proto>
// (verify against upstream before promoting to production).
//
// This file ships a curated subset of the upstream RPCs — the ones the
// harness needs today. Streaming RPCs and the GetTaddress* methods land
// when callers need them.

syntax = "proto3";
package cash.z.wallet.sdk.rpc;
option go_package = "lightwalletd/walletrpc";

import "compact_formats.proto";

// (height, hash) pair identifying a block. For lookup either field may
// be set; for return values both are populated.
message BlockID {
    uint64 height = 1;
    bytes hash = 2;
}

message BlockRange {
    BlockID start = 1;
    BlockID end = 2;
    // Optional pool selector. 0 = transparent, 1 = sapling, 2 = orchard
    // (mirrors the upstream lightwalletd `PoolType` enum). Empty list
    // defaults to sapling+orchard per the lightwalletd contract.
    repeated int32 poolTypes = 3;
}

// Network-of-interest selector. Empty in practice.
message ChainSpec {}

message Empty {}

message RawTransaction {
    bytes data = 1;
    uint64 height = 2;
}

message SendResponse {
    int32 errorCode = 1;
    string errorMessage = 2;
}

// `lightd info` — version/chain metadata + the indexer's current tip.
// Used in liveness checks; mirrors lightwalletd's struct one-to-one.
message LightdInfo {
    string version = 1;
    string vendor = 2;
    bool taddrSupport = 3;
    string chainName = 4;
    uint64 saplingActivationHeight = 5;
    string consensusBranchId = 6;
    uint64 blockHeight = 7;
    string gitCommit = 8;
    string branch = 9;
    string buildDate = 10;
    string buildUser = 11;
    uint64 estimatedHeight = 12;
    string zcashdBuild = 13;
    string zcashdSubversion = 14;
}

message TxFilter {
    BlockID block = 1;
    uint64 index = 2;
    bytes hash = 3;
}

// Set of transparent addresses to query.
message AddressList {
    repeated string addresses = 1;
}

// Aggregate transparent balance over an AddressList.
message Balance {
    int64 valueZat = 1;
}

// Snapshot of a shielded-pool note-commitment tree at one block.
message TreeState {
    string network = 1;
    uint64 height = 2;
    string hash = 3;
    uint32 time = 4;
    string saplingTree = 5;
    string orchardTree = 6;
}

// Argument to GetSubtreeRoots: start index + shielded protocol selector
// + entry cap (0 = no cap).
message GetSubtreeRootsArg {
    uint32 startIndex = 1;
    int32 shieldedProtocol = 2;
    uint32 maxEntries = 3;
}

// One subtree root entry: the root hash plus the height + hash of the
// block that completed it.
message SubtreeRoot {
    bytes rootHash = 1;
    uint64 completingBlockHeight = 2;
    bytes completingBlockHash = 3;
}

// Address + block range filter for `GetTaddressTxids`.
message TransparentAddressBlockFilter {
    string address = 1;
    BlockRange range = 2;
}

// `GetMempoolTx` query: txid suffixes to skip.
message Exclude {
    repeated bytes txid = 1;
}

// `GetAddressUtxos` query.
message GetAddressUtxosArg {
    repeated string addresses = 1;
    uint64 startHeight = 2;
    uint32 maxEntries = 3;
}

// One UTXO row returned by `GetAddressUtxos`.
message GetAddressUtxosReply {
    string address = 1;
    bytes txid = 2;
    int32 index = 3;
    bytes script = 4;
    int64 valueZat = 5;
    uint64 height = 6;
}

message GetAddressUtxosReplyList {
    repeated GetAddressUtxosReply addressUtxos = 1;
}

// The lightwalletd / Zaino gRPC contract.
service CompactTxStreamer {
    // Chain tip the indexer currently knows about.
    rpc GetLatestBlock(ChainSpec) returns (BlockID) {}
    // Full compact block at a given height (or by hash).
    rpc GetBlock(BlockID) returns (CompactBlock) {}
    // Compact block returning only nullifier-bearing fields.
    rpc GetBlockNullifiers(BlockID) returns (CompactBlock) {}
    // Streaming compact blocks over an inclusive height range.
    rpc GetBlockRange(BlockRange) returns (stream CompactBlock) {}
    // Streaming nullifier-only compact blocks over an inclusive range.
    rpc GetBlockRangeNullifiers(BlockRange) returns (stream CompactBlock) {}
    // Submit a raw signed transaction to the network via the indexer.
    rpc SendTransaction(RawTransaction) returns (SendResponse) {}
    // Look up a transaction by (block, index) or by hash.
    rpc GetTransaction(TxFilter) returns (RawTransaction) {}
    // Build / consensus / chain metadata.
    rpc GetLightdInfo(Empty) returns (LightdInfo) {}
    // Aggregate confirmed transparent balance across the given addresses.
    rpc GetTaddressBalance(AddressList) returns (Balance) {}
    // Note-commitment tree state at a given block.
    rpc GetTreeState(BlockID) returns (TreeState) {}
    // Note-commitment tree state at the chain tip.
    rpc GetLatestTreeState(Empty) returns (TreeState) {}
    // Streaming subtree-root entries; lightwalletd's tree spine.
    rpc GetSubtreeRoots(GetSubtreeRootsArg) returns (stream SubtreeRoot) {}
    // Stream txids that paid to / spent from a transparent address.
    rpc GetTaddressTxids(TransparentAddressBlockFilter) returns (stream RawTransaction) {}
    // Stream mempool transactions, with an exclude filter.
    rpc GetMempoolTx(Exclude) returns (stream CompactTx) {}
    // Stream mempool transactions live; closes when the tip changes.
    rpc GetMempoolStream(Empty) returns (stream RawTransaction) {}
    // Unspent transparent outputs for a set of addresses.
    rpc GetAddressUtxos(GetAddressUtxosArg) returns (GetAddressUtxosReplyList) {}
    // Streaming form of `GetAddressUtxos`.
    rpc GetAddressUtxosStream(GetAddressUtxosArg) returns (stream GetAddressUtxosReply) {}
}
