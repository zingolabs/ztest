[workspace]
members = ["macros"]
resolver = "2"

[workspace.package]
edition = "2024"
license = "MIT"
authors = ["Zingolabs <zingo@zingolabs.org>"]
repository = "https://github.com/zingolabs/ztest"
homepage = "https://github.com/zingolabs/ztest"
version = "0.0.0"

[workspace.dependencies]
ztest_macros = { path = "macros", version = "0.0.0" }

thiserror = "1.0.64"
tokio = "1.42.0"
tracing = "0.1.40"
serde_json = "1.0.132"
hex = "0.4.3"
reqwest = { version = "0.12", default-features = false }

zcash_protocol = { version = "0.9.0", features = ["local-consensus"] }
zcash_primitives = "0.28.0"
zcash_client_backend = { version = "0.23", default-features = false, features = ["lightwalletd-tonic", "transparent-inputs", "orchard"] }

# TODO: Remove vendored?
zingo_common_components = "0.3.1"

# ─────────────────────────── ztest crate ──────────────────────────────
[package]
name = "ztest"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Boot Zcash topologies on Kubernetes and hand typed RPC handles back to test code."

[lib]
name = "ztest"
path = "src/lib.rs"

[dependencies]
ztest_macros = { workspace = true }

thiserror = { workspace = true }
tokio = { workspace = true, features = ["rt", "rt-multi-thread", "macros", "sync", "net", "io-util", "time", "fs", "process", "signal"] }
tracing = { workspace = true }
async-trait = "0.1"

kube = { version = "0.99", default-features = false, features = ["client", "runtime", "ws", "rustls-tls"] }
k8s-openapi = { version = "0.24", features = ["latest"] }
futures = "0.3"
serde = { version = "1", features = ["derive"] }
serde_json = { workspace = true }
rand = "0.8"
sha2 = "0.10"
hex = { workspace = true }
walkdir = "2"
inventory = "0.3"
ctor = "0.2"

zcash_protocol = { workspace = true }
zcash_primitives = { workspace = true }
zcash_client_backend = { workspace = true }
zingo_common_components = { workspace = true }

# In-process wallet backend (`backends::zingo`). zingolib runs as a library
# in the test binary against the pod-hosted indexer's gRPC. Git pins MUST
# match the consumer crates' pins so the resolved zcash_* / zebra-chain /
# nonempty / TxId copies unify into single versions in the lockfile.
zingolib = { git = "https://github.com/zingolabs/zingolib.git", rev = "61418d6ecbc679a88da8268a2be5db3926501fc6", features = [
    "testutils",
] }
zingolib_testutils = { git = "https://github.com/zingolabs/zingolib.git", rev = "61418d6ecbc679a88da8268a2be5db3926501fc6" }
pepper-sync = { git = "https://github.com/zingolabs/zingolib.git", rev = "61418d6ecbc679a88da8268a2be5db3926501fc6" }
zingo_test_vectors = { git = "https://github.com/zingolabs/infrastructure.git", tag = "zcash_local_net_v0.6.0" }
zebra-chain = "9.0.0"
zip32 = "0.2.1"
nonempty = "0.11"
http = "1.1"
tempfile = "3.2"

reqwest = { workspace = true }
jsonrpsee-types = "0.24"
tonic = { version = "0.14", default-features = false, features = ["transport", "channel"] }
rustls = { version = "0.23", default-features = false, features = ["ring"] }

owo-colors = "4.3.0"
supports-color = "3.0.2"
supports-unicode = "3.0.0"
bytesize = "2.3.1"
terminal_size = "0.4"
crossterm = "0.29"
portable-pty = "0.9"
# Inline-viewport TUI for the unified bottom console; `scrolling-regions` MUST
# stay off (default) so output scrolls into native terminal scrollback rather
# than a DECSTBM region. `avt` is an in-memory VT emulator whose `feed_str`
# emits lines as they scroll off the top — the mechanism for forwarding child
# output into native scrollback (see docs/engine-design.md).
ratatui = "0.30"
avt = "0.18"
libc = "0.2"
clap = { version = "4", features = ["derive", "env", "wrap_help"] }
nextest-metadata = "0.14"
